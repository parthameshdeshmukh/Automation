
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Application Dashboard</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 40px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #2c3e50; }
        .stats { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .stat-card { background: #e0f7fa; padding: 20px; border-radius: 8px; text-align: center; width: 40%; }
        .stat-card h2 { margin: 0; font-size: 36px; color: #00796b; }
        .stat-card p { margin: 5px 0 0 0; color: #004d40; font-weight: bold; }
        #piechart_3d { width: 100%; height: 500px; }
    </style>
    <script type="text/javascript">
      google.charts.load("current", {packages:["corechart"]});
      google.charts.setOnLoadCallback(drawChart);
      function drawChart() {
        var data = google.visualization.arrayToDataTable([["Date","Applications"],["Sun, Apr 26",14]]);

        var options = {
          title: 'Applications Distribution by Day',
          is3D: true,
          pieSliceText: 'value', // Shows the exact number on the slice
          legend: { position: 'right', textStyle: { fontSize: 14 } },
          titleTextStyle: { fontSize: 18, color: '#2c3e50' },
          backgroundColor: 'transparent',
          chartArea: { width: '90%', height: '80%' }
        };

        var chart = new google.visualization.PieChart(document.getElementById('piechart_3d'));
        chart.draw(data, options);
      }
    </script>
</head>
<body>
    <div class="container">
        <h1>🚀 Weekly Application Dashboard</h1>
        
        <div class="stats">
            <div class="stat-card">
                <h2>14</h2>
                <p>Total Applications Sent</p>
            </div>
            <div class="stat-card">
                <h2>1</h2>
                <p>Active Days</p>
            </div>
        </div>

        <!-- This is where the 3D Pie Chart renders -->
        <div id="piechart_3d"></div>
    </div>
</body>
</html>
